# http://www.gradle.org/docs/current/userguide/build_environment.html
# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for tweaking memory settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# When configured, Gradle will run in separate processes of at most the specified size for each task.
# org.gradle.parallel=true
# AndroidX property
android.useAndroidX=true
# Automatically convert third-party libraries to use AndroidX
android.enableJetifier=true
# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official
# Use this property to specify which type of bitmap implementation should be used by the Android plugin.
# By default, it uses the "native" implementation which is faster and uses less memory.
# android.graphics.useNative=true
